<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Filament Spools • Edol</title>

    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <link href="/favicon.svg" rel="icon" type="image/svg+xml">

    <style>
        .arrow {
            transition: transform 0.25s ease;
        }

        .arrow.rotated {
            transform: rotate(90deg);
        }

        .page-wrapper {
            margin-left: 15rem;
        }

        .table-secondary td {
            vertical-align: middle;
            padding-top: 0.65rem;
            padding-bottom: 0.65rem;
        }

        .group-row td {
            vertical-align: middle;
        }

        .custom-dropdown-menu {
            position: absolute;
            right: 0;
            top: calc(100% + 4px);

            min-width: 180px;

            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;

            padding: 0.5rem 0;

            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);

            z-index: 9999;
        }

        .custom-dropdown-menu .dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;

            padding: 0.5rem 1rem;

            color: inherit;
            text-decoration: none;
        }

        .custom-dropdown-menu .dropdown-item:hover {
            background: #f5f7fb;
        }
    </style>

</head>

<body class="layout-fluid">

<div class="page">

    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark"
           th:fragment="sidebar">
        <div th:replace="~{dashboard/sidebar :: sidebar}"></div>
    </aside>

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl mt-4">

                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Filament Spools</h3>
                        <div class="card-actions">
                            <a class="btn btn-primary" href="/filament-spools/new">
                                Add Spool
                            </a>
                        </div>
                    </div>

                    <div class="card-body border-bottom">
                        <form class="d-flex justify-content-between align-items-center flex-wrap gap-2" method="get">
                            <!-- LEFT: Filters -->
                            <div class="d-flex gap-2">
                                <select class="form-select w-auto" name="vendor" onchange="this.form.submit()">
                                    <option value="">All Vendors</option>
                                    <option th:each="v : ${vendors}"
                                            th:selected="${v.name == selectedVendor}"
                                            th:text="${v.name}"
                                            th:value="${v.name}">
                                    </option>
                                </select>
                                <div class="btn-group align-items-center gap-2">
                                    <!-- ALL -->
                                    <a class="btn"
                                       th:classappend="${selectedMaterial == null or selectedMaterial == ''} ? 'btn-primary' : 'btn-outline-primary'"
                                       th:href="@{/filament-spools(vendor=${selectedVendor})}">
                                        All
                                    </a>
                                    <!-- MATERIAL BUTTONS -->
                                    <a class="btn"
                                       th:classappend="${m.name == selectedMaterial} ? 'btn-primary' : 'btn-outline-primary'"
                                       th:each="m : ${materials}"
                                       th:href="@{/filament-spools(vendor=${selectedVendor}, material=${m.name})}"
                                       th:text="${m.name}">
                                    </a>
                                </div>

                                <div class="btn-group gap-2" id="status-filters">
                                    <button class="btn btn-outline-info status-btn" data-status="SEALED"
                                            type="button">
                                        SEALED
                                    </button>
                                    <button class="btn btn-outline-info status-btn" data-status="ACTIVE"
                                            type="button">
                                        ACTIVE
                                    </button>
                                    <button class="btn btn-outline-info status-btn" data-status="EMPTY"
                                            type="button">
                                        EMPTY
                                    </button>
                                    <button class="btn btn-outline-info status-btn" data-status="ARCHIVED"
                                            type="button">
                                        ARCHIVED
                                    </button>
                                </div>

                                <a class="btn btn-outline-secondary" href="/filament-spools"
                                   title="Reset filters">
                                    <i class="ti ti-restore"></i>
                                </a>
                            </div>

                            <!-- RIGHT: future controls -->
                            <div class="d-flex gap-2">

                            </div>

                        </form>

                    </div>

                    <div class="table-responsive">

                        <table class="table">

                            <thead>
                            <tr>
                                <th style="width:48px"></th>
                                <th style="width:80px">ID</th>
                                <th>Vendor</th>
                                <th style="width:120px">Material</th>
                                <th>Brand</th>
                                <th style="width:180px">Color</th>
                                <th style="width:320px">Remaining</th>
                                <th style="width:140px">Price</th>
                                <th style="width:140px">Status</th>
                                <th style="width:140px">Actions</th>
                            </tr>
                            </thead>

                            <tbody>

                            <th:block th:each="entry : ${groupedSpools}">
                                <!-- PARENT FILAMENT -->
                                <tr class="table-secondary">
                                    <!-- collapse -->
                                    <td>
                                        <button class="btn btn-sm btn-icon group-toggle"
                                                th:attr="
                                                    data-bs-target=|#group-${entry.key.id}|,
                                                    aria-controls=|group-${entry.key.id}|,
                                                    aria-expanded=false"
                                                type="button">
                                            <i class="ti ti-chevron-right arrow"></i>
                                        </button>
                                    </td>

                                    <!-- ID -->
                                    <td><!--<strong th:text="${entry.key.id}"></strong>--></td>

                                    <!-- Vendor -->
                                    <td th:text="${entry.key.vendor.name}"></td>

                                    <!-- Material -->
                                    <td>
                                        <span class="badge bg-teal text-teal-fg"
                                              th:text="${entry.key.materialType.name}">
                                        </span>
                                    </td>

                                    <!-- Brand -->
                                    <td th:text="${entry.key.brand}"></td>

                                    <!-- Color -->
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <span th:style="'width:28px;height:28px;border-radius:4px;border:1px solid #ccc;background:' + ${entry.key.colorHex}">
                                            </span>
                                            <span th:text="${entry.key.colorHex}"></span>
                                        </div>
                                    </td>

                                    <!-- Remaining -->
                                    <td>
                                        <div class="text-muted small">
                                            <strong th:text="${entry.value.size()}"></strong>
                                            spool(s)
                                        </div>
                                        <div class="text-muted small"
                                             th:text="${#aggregates.sum(entry.value.![weightRemaining]) + ' g total'}">
                                        </div>
                                    </td>

                                    <!-- Price -->
                                    <td>
                                        —
                                    </td>

                                    <!-- Status -->
                                    <td>
                                        <span class="badge bg-blue text-blue-fg">
                                            GROUP
                                        </span>
                                    </td>
                                    <!-- Actions -->
                                    <td></td>
                                </tr>


                                <th:block th:each="s : ${entry.value}">
                                    <!-- existing spool row -->
                                    <tr class="group-row d-none"
                                        th:attr="data-group=|group-${entry.key.id}|">
                                        <!-- collapse -->
                                        <td>
                                            <button class="btn btn-sm btn-icon spool-toggle"
                                                    th:attr="
                                                                        data-bs-target=|#details-${s.id}|,
                                                                        aria-controls=|details-${s.id}|,
                                                                        aria-expanded=false"
                                                    type="button">
                                                <i class="ti ti-chevron-right arrow"></i>
                                            </button>
                                        </td>

                                        <td th:text="${s.id}"></td>

                                        <!-- Vendor -->
                                        <td th:text="${s.filament.vendor.name}"></td>

                                        <!-- MATERIAL -->
                                        <td>
                                            <span class="badge bg-teal text-teal-fg"
                                                  th:text="${s.filament.materialType.name}">
                                            </span>
                                        </td>

                                        <!-- BRAND -->
                                        <td th:text="${s.filament.brand}"></td>

                                        <!-- COLOR -->
                                        <td>
                                            <div class="d-flex align-items-center gap-2">
                                                                <span
                                                                        th:style="'width:28px;height:28px;border-radius:4px;border:1px solid #ccc;background:' + ${s.filament.colorHex}">
                                                                </span>
                                                <span th:text="${s.filament.colorHex}"></span>
                                            </div>
                                        </td>

                                        <!-- REMAINING -->
                                        <td style="min-width:180px">
                                            <div class="progress progress-sm">
                                                <div class="progress-bar"
                                                     th:classappend="${s.weightRemaining < 200} ? ' bg-red' : ' bg-blue'"
                                                     th:style="'width:' + (${s.weightRemaining} * 100 / ${s.weightTotal}) + '%'">
                                                </div>
                                            </div>
                                            <div class="text-muted small mt-1">
                                                <span th:text="${s.weightRemaining}"></span> /
                                                <span th:text="${s.weightTotal}"></span> g
                                            </div>
                                        </td>

                                        <td th:text="${#numbers.formatDecimal(s.price,1,2)} + ' ₴'"></td>

                                        <td>
                                                            <span class="badge"
                                                                  th:classappend="${s.status == T(org.spon.edoldashboard.model.entity.FilamentSpool.FilamentSpoolStatus).SEALED ? 'bg-green text-green-fg' : s.status == T(org.spon.edoldashboard.model.entity.FilamentSpool.FilamentSpoolStatus).ACTIVE ? 'bg-blue text-blue-fg' : s.status == T(org.spon.edoldashboard.model.entity.FilamentSpool.FilamentSpoolStatus).EMPTY ? 'bg-yellow text-yellow-fg' : 'bg-secondary text-secondary-fg'}"
                                                                  th:text="${s.status}">
                                                            </span>
                                        </td>

                                        <td>


                                            <div class="d-flex align-items-center gap-2 overflow-visible">

                                                <a class="btn btn-sm btn-outline-info"
                                                   th:href="@{/s/{id}(id=${s.id})}"
                                                   title="Load spool in the AMS">
                                                    <i class="ti ti-status-change"></i>
                                                </a>

                                                <div class="position-relative">

                                                    <button class="btn btn-sm btn-outline-secondary actions-toggle"
                                                            type="button">
                                                        <i class="ti ti-settings"></i>
                                                    </button>

                                                    <div class="custom-dropdown-menu d-none">

                                                        <a class="dropdown-item"
                                                           th:href="@{/filament-spools/label/{id}(id=${s.id})}">
                                                            <i class="ti ti-qrcode me-2"></i>
                                                            QR Label
                                                        </a>

                                                        <a class="dropdown-item"
                                                           th:href="@{/filament-spools/duplicate/{id}(id=${s.id})}">
                                                            <i class="ti ti-copy me-2"></i>
                                                            Duplicate
                                                        </a>

                                                        <a class="dropdown-item"
                                                           th:href="@{/filament-spools/edit/{id}(id=${s.id})}">
                                                            <i class="ti ti-edit me-2"></i>
                                                            Edit
                                                        </a>

                                                        <a class="dropdown-item text-danger"
                                                           onclick="return confirmDelete(this)"
                                                           th:attr="data-name=${s.filament.fullId}"
                                                           th:href="@{/filament-spools/delete/{id}(id=${s.id})}">
                                                            <i class="ti ti-trash me-2"></i>
                                                            Delete
                                                        </a>

                                                    </div>

                                                </div>

                                            </div>
                                        </td>

                                    </tr>

                                    <!-- DETAILS -->
                                    <tr class="details-row d-none"
                                        th:attr="data-group=|group-${entry.key.id}|">

                                        <td class="p-0 border-0" colspan="10">

                                            <div class="custom-collapse d-none"
                                                 th:id="|details-${s.id}|">

                                                <div class="p-3">

                                                    <div class="row">

                                                        <div class="row g-3">

                                                            <div class="col-md-4">
                                                                <div class="text-muted small">Opened
                                                                </div>
                                                                <div th:text="${s.openedAt != null ? #temporals.format(s.openedAt, 'dd.MM.yyyy HH:mm') : '—'}"></div>
                                                            </div>

                                                            <div class="col-md-4">
                                                                <div class="text-muted small">Last
                                                                    used
                                                                </div>
                                                                <div th:text="${s.lastUsedAt != null ? #temporals.format(s.lastUsedAt, 'dd.MM.yyyy HH:mm') : '—'}"></div>
                                                            </div>

                                                            <div class="col-md-4">
                                                                <div class="d-flex justify-content-between align-items-start">
                                                                    <div>
                                                                        <div class="text-muted small">
                                                                            Last dried
                                                                        </div>
                                                                        <div th:id="|dried-date-${s.id}|"
                                                                             th:text="${s.lastDriedAt != null
                                                                                                ? #temporals.format(s.lastDriedAt, 'dd.MM.yyyy HH:mm')
                                                                                                : '—'}">
                                                                        </div>
                                                                    </div>
                                                                    <button class="btn btn-sm btn-outline-orange"
                                                                            th:onclick="|markDried(${s.id})|">
                                                                        <i class="ti ti-wind me-1"></i>
                                                                        Dried
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div class="row g-3">
                                                            <div class="col-md-4">
                                                                <div class="text-muted small">Store
                                                                </div>
                                                                <a target="_blank"
                                                                   th:href="${s.storeUrl}"
                                                                   th:if="${s.storeUrl}"
                                                                   th:text="${s.storeUrl}">
                                                                </a>
                                                                <span th:unless="${s.storeUrl}">—</span>

                                                            </div>

                                                            <div class="col-md-6">
                                                                <div class="text-muted small">Comment
                                                                </div>
                                                                <div th:text="${s.comment ?: '—'}"></div>
                                                            </div>
                                                        </div>

                                                    </div>

                                                </div>

                                            </div>

                                        </td>
                                    </tr>

                                </th:block>


                            </th:block>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

<script>
    function confirmDelete(el) {
        const name = el.dataset.name;
        return confirm("Delete spool: " + name + "?");
    }

    document.addEventListener("DOMContentLoaded", function () {

        // GROUP TOGGLES
        document.querySelectorAll('.group-toggle')
            .forEach(button => {

                const targetSelector =
                    button.getAttribute('data-bs-target');

                const groupName =
                    targetSelector.replace('#', '');

                const arrow =
                    button.querySelector('.arrow');

                button.addEventListener('click', () => {

                    document.querySelectorAll(
                        `[data-group="${groupName}"]`
                    ).forEach(row => {
                        row.classList.toggle('d-none');
                    });

                    arrow.classList.toggle('rotated');

                });

            });

        // DETAILS TOGGLES
        document.querySelectorAll('.spool-toggle')
            .forEach(button => {

                const targetSelector =
                    button.getAttribute('data-bs-target');

                const target =
                    document.querySelector(targetSelector);

                const arrow =
                    button.querySelector('.arrow');

                if (!target)
                    return;

                button.addEventListener('click', () => {

                    target.classList.toggle('d-none');

                    arrow.classList.toggle('rotated');

                });

            });

    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        const buttons = document.querySelectorAll('.status-btn');
        const url = new URL(window.location.href);
        const params = url.searchParams;

        // Get current statuses
        let selected = params.getAll('status');

        // Default behavior (SEALED + ACTIVE)
        if (selected.length === 0) {
            selected = ['SEALED', 'ACTIVE'];
        }

        // Highlight active buttons
        buttons.forEach(btn => {
            const status = btn.dataset.status;
            if (selected.includes(status)) {
                btn.classList.remove('btn-outline-info');
                btn.classList.add('btn-info');
            }
        });

        // Click handler
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const status = btn.dataset.status;
                let current = params.getAll('status');

                if (current.length === 0) {
                    current = ['SEALED', 'ACTIVE'];
                }

                const ORDER = ['SEALED', 'ACTIVE', 'EMPTY', 'ARCHIVED'];
                current.sort((a, b) => ORDER.indexOf(a) - ORDER.indexOf(b));

                // toggle logic
                if (current.includes(status)) {
                    current = current.filter(s => s !== status);
                } else {
                    current.push(status);
                }

                // clear old params
                params.delete('status');

                // apply new ones
                current.forEach(s => params.append('status', s));

                // redirect
                window.location.href = url.toString();
            });
        });

        document.querySelectorAll('.actions-toggle')
            .forEach(button => {

                const menu =
                    button.parentElement.querySelector('.custom-dropdown-menu');

                if (!menu)
                    return;

                button.addEventListener('click', (e) => {

                    e.stopPropagation();

                    // close others
                    document.querySelectorAll('.custom-dropdown-menu')
                        .forEach(m => {
                            if (m !== menu)
                                m.classList.add('d-none');
                        });

                    menu.classList.toggle('d-none');

                });

            });

        document.addEventListener('click', () => {
            document.querySelectorAll('.custom-dropdown-menu')
                .forEach(menu => menu.classList.add('d-none'));
        });

    });

    async function markDried(spoolId) {
        const response = await fetch(
            `/filament-spools/dry/${spoolId}`,
            {
                method: "POST"
            }
        );

        if (!response.ok)
            return;

        const now = new Date();

        const formatted =
            now.toLocaleDateString('uk-UA') +
            ' ' +
            now.toLocaleTimeString('uk-UA', {
                hour: '2-digit',
                minute: '2-digit'
            });

        document.getElementById(
            `dried-date-${spoolId}`
        ).textContent = formatted;
    }
</script>

</html>
