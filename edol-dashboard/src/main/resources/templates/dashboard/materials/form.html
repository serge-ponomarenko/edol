<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Material • Edol</title>

    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="/favicon.svg" rel="icon" type="image/svg+xml">

</head>

<body class="layout-fluid">

<div class="page">

    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark"
           th:fragment="sidebar">
        <div th:replace="~{dashboard/sidebar :: sidebar}"></div>
    </aside>

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl mt-4">

                <div class="card">

                    <div class="card-header">
                        <h3 class="card-title">Material</h3>
                    </div>

                    <div class="card-body">

                        <form method="post" th:action="@{/materials}" th:object="${material}">

                            <input th:field="*{id}" type="hidden"/>

                            <div class="mb-3">

                                <label class="form-label">Name</label>

                                <input class="form-control" th:field="*{name}" type="text"/>

                            </div>

                            <button class="btn btn-primary" type="submit">
                                Save
                            </button>

                            <a class="btn btn-secondary" href="/materials">
                                Cancel
                            </a>

                        </form>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
