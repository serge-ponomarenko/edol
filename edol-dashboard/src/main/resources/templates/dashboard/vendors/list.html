<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Vendors • Edol</title>

    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="/favicon.svg" rel="icon" type="image/svg+xml">

</head>

<body class="layout-fluid">

<div class="page">

    <!-- Sidebar -->
    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark"
           th:fragment="sidebar">
        <div th:replace="~{dashboard/sidebar :: sidebar}"></div>
    </aside>

    <!-- Content -->

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl mt-4">

                <div class="card">

                    <div class="card-header">

                        <h3 class="card-title">Vendors</h3>

                        <div class="card-actions">
                            <a class="btn btn-primary" href="/vendors/new">
                                Add Vendor
                            </a>
                        </div>

                    </div>

                    <table class="table">

                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Website</th>
                            <th>Actions</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="vendor : ${vendors}">

                            <td th:text="${vendor.id}"></td>
                            <td th:text="${vendor.name}"></td>
                            <td th:text="${vendor.website}"></td>

                            <td>

                                <a class="btn btn-sm btn-warning"
                                   th:href="@{/vendors/edit/{id}(id=${vendor.id})}">
                                    Edit
                                </a>

                                <a class="btn btn-sm btn-danger"
                                   onclick="return confirmDelete(this)"
                                   th:attr="data-name=${vendor.name}"
                                   th:href="@{/vendors/delete/{id}(id=${vendor.id})}">
                                    Delete
                                </a>

                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>
    </div>

</div>

</body>

<script>
    function confirmDelete(el) {
        const name = el.dataset.name;
        return confirm("Delete vendor: " + name + "?");
    }
</script>

</html>
