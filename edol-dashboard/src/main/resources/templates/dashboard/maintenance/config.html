<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Maintenance Configurations • Edol</title>

    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="/favicon.svg" rel="icon" type="image/svg+xml">

</head>

<body class="layout-fluid">

<div class="page">

    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark"
           th:fragment="sidebar">
        <div th:replace="~{dashboard/sidebar :: sidebar}"></div>
    </aside>

    <div class="page-wrapper">

        <div class="page-body">

            <div class="container-xl mt-4">

                <div class="card">
                    <div class="card-header">

                        <h3 class="card-title">Maintenance Definitions Types</h3>

                        <div class="card-actions">
                            <a class="btn btn-primary" href="/maintenance/config/printer-stats-form">
                                Edit Printer Statistics
                            </a>
                        </div>

                        <div class="card-actions">
                            <a class="btn btn-primary" href="/maintenance/config/new">
                                Add Maintenance Definition
                            </a>
                        </div>

                    </div>

                    <div class="card-body">

                        <table class="table table-hover">

                            <thead>
                            <tr>
                                <th>Name</th>
                                <th>Hours</th>
                                <th>Days</th>
                                <th>Status</th>
                                <th></th>
                            </tr>
                            </thead>

                            <tbody>

                            <tr th:each="m : ${definitions}">

                                <td th:text="${m.name}"></td>

                                <td th:text="${m.intervalHours} ?: '-'"></td>

                                <td th:text="${m.intervalDays} ?: '-'"></td>

                                <td>
                                <span class="badge"
                                      th:classappend="${m.active} ? 'bg-green text-green-fg' : 'bg-red text-red-fg'"
                                      th:text="${m.active} ? 'Active' : 'Disabled'">
                                </span>
                                </td>

                                <td class="text-end">
                                    <form method="post"
                                          style="display:inline"
                                          th:action="@{/maintenance/config/{id}/toggle(id=${m.id})}">
                                        <button class="btn btn-sm btn-warning">
                                            Toggle active
                                        </button>
                                    </form>

                                    <a class="btn btn-sm btn-info"
                                       th:href="@{/maintenance/config/edit/{id}(id=${m.id})}">
                                        Edit
                                    </a>

                                    <form method="post"
                                          style="display:inline"
                                          th:action="@{/maintenance/config/{id}/delete(id=${m.id})}">
                                        <button class="btn btn-sm btn-danger"
                                                onclick="return confirmDelete(this)"
                                                th:attr="data-name=${m.name}">
                                            Delete
                                        </button>
                                    </form>

                                </td>

                            </tr>

                            </tbody>
                        </table>

                    </div>
                </div>

            </div>
        </div>

    </div>

</div>

</body>

<script>
    function confirmDelete(el) {
        const name = el.dataset.name;
        return confirm("Delete maintenance configuration: " + name + "?");
    }
</script>

</html>
