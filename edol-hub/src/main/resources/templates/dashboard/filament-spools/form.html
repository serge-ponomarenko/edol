<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Spool • Edol Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="/favicon.svg" rel="icon" type="image/svg+xml">

</head>

<body class="layout-fluid">

<div class="page">

    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark"
           th:fragment="sidebar">
        <div th:replace="~{dashboard/sidebar :: sidebar}"></div>
    </aside>

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl mt-4">

                <div class="card">

                    <div class="card-header">
                        <h3 class="card-title">Spool</h3>
                    </div>

                    <div class="card-body">

                        <form method="post" th:action="@{/filament-spools}" th:object="${spool}">

                            <input th:field="*{id}" type="hidden"/>

                            <!-- FILAMENT -->
                            <div class="mb-3">
                                <label class="form-label">Filament</label>

                                <!-- HIDDEN INPUT (go to POST) -->
                                <input id="filamentId"
                                       name="filament.id"
                                       th:value="${spool.filament != null ? spool.filament.id : ''}"
                                       type="hidden">

                                <!-- CUSTOM SELECT -->
                                <div class="dropdown">

                                    <button class="btn btn-outline-secondary w-100 text-start"
                                            data-bs-toggle="dropdown"
                                            id="filamentDropdown"
                                            type="button">

                                        <span id="selectedFilamentText">Select filament...</span>

                                    </button>

                                    <div class="dropdown-menu w-100" style="max-height:300px;overflow:auto;">

                                        <button class="dropdown-item d-flex align-items-center gap-2"
                                                th:attr="
                                                        data-id=${f.id},
                                                        data-color=${f.colorHex},
                                                         data-color-name=${f.colorName},
                                                        data-text=${f.fullId},
                                                        data-weight=${f.defaultWeightTotal},
                                                        data-empty-weight=${f.defaultEmptySpoolWeight},
                                                    "
                                                th:each="f : ${filaments}"
                                                type="button">

                                            <!-- COLOR -->
                                            <span th:style="'width:16px;height:16px;border-radius:4px;border:1px solid #ccc;background:' + ${f.colorHex}">
                                        </span>

                                            <div class="d-flex flex-column">
                                                <span th:text="${f.fullId}"></span>
                                                <small class="text-muted">
                                                    <span th:text="${f.colorName ?: 'Unknown'}"></span>
                                                    •
                                                    <span class="font-monospace"
                                                          th:text="${f.colorHex}">
                                                     </span>
                                                </small>
                                            </div>

                                        </button>

                                    </div>

                                </div>
                            </div>

                            <!-- TOTAL -->
                            <div class="mb-3">
                                <label class="form-label">Total weight (g)</label>
                                <input class="form-control"
                                       min="0"
                                       step="1"
                                       th:field="*{weightTotal}"
                                       type="number">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">
                                    Empty spool weight (g)
                                </label>

                                <input class="form-control"
                                       min="0"
                                       step="0.1"
                                       th:field="*{emptySpoolWeight}"
                                       type="number">
                            </div>

                            <!-- REMAINING -->
                            <div class="mb-3">
                                <label class="form-label">Remaining weight (g)</label>
                                <input class="form-control"
                                       min="0"
                                       step="0.1"
                                       th:field="*{weightRemaining}"
                                       type="number">
                            </div>

                            <!-- QUANTITY -->
                            <div class="mb-3" th:if="${spool.id == null}">
                                <label class="form-label">Quantity</label>

                                <input class="form-control"
                                       min="1"
                                       name="quantity"
                                       type="number"
                                       value="1">
                            </div>

                            <!-- PRICE -->
                            <div class="mb-3">
                                <label class="form-label">Price (₴)</label>
                                <input class="form-control" step="0.01"
                                       th:field="*{price}"
                                       type="number">
                            </div>

                            <!-- STORE URL -->
                            <div class="mb-3">
                                <label class="form-label">Store URL</label>
                                <input class="form-control"
                                       placeholder="https://..."
                                       th:field="*{storeUrl}"
                                       type="text">
                            </div>

                            <!-- PURCHASED AT -->
                            <div class="mb-3">
                                <label class="form-label">Purchased at</label>
                                <input class="form-control"
                                       th:field="*{purchasedAt}"
                                       type="datetime-local">
                            </div>

                            <!-- OPENED AT -->
                            <div class="mb-3">
                                <label class="form-label">Opened at</label>
                                <input class="form-control"
                                       th:field="*{openedAt}"
                                       type="datetime-local">
                            </div>

                            <!-- LAST USED AT -->
                            <div class="mb-3">
                                <label class="form-label">Last used at</label>
                                <input class="form-control"
                                       th:field="*{lastUsedAt}"
                                       type="datetime-local">
                            </div>

                            <!-- OPENED AT -->
                            <div class="mb-3">
                                <label class="form-label">Last dried at</label>
                                <input class="form-control"
                                       th:field="*{lastDriedAt}"
                                       type="datetime-local">
                            </div>

                            <!-- STATUS -->
                            <div class="mb-3">
                                <label class="form-label">Status</label>
                                <select class="form-select" th:field="*{status}">
                                    <option th:each="s : ${T(org.spon.edolhub.model.entity.FilamentSpool.FilamentSpoolStatus).values()}"
                                            th:text="${s}"
                                            th:value="${s}">
                                    </option>
                                </select>
                            </div>

                            <!-- COMMENT -->
                            <div class="mb-3">
                                <label class="form-label">Comment</label>
                                <textarea class="form-control"
                                          rows="3"
                                          th:field="*{comment}">
                            </textarea>
                            </div>

                            <button class="btn btn-primary" type="submit">
                                Save
                            </button>

                            <a class="btn btn-secondary" href="/filament-spools">
                                Cancel
                            </a>

                        </form>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

</body>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const items = document.querySelectorAll('.dropdown-item[data-id]');
        const hiddenInput = document.getElementById('filamentId');

        setTimeout(() => {
            if (hiddenInput.value) {
                const selected = document.querySelector(`.dropdown-item[data-id="${hiddenInput.value}"]`);
                if (selected) selectFilament(selected);
            }
        }, 0);

        items.forEach(item => {
            item.addEventListener('click', () => selectFilament(item));
        });

    });

    function selectFilament(item) {
        const id = item.getAttribute('data-id');
        const text = item.getAttribute('data-text');
        const color = item.getAttribute('data-color');
        const colorName = item.getAttribute('data-color-name');

        const hiddenInput = document.getElementById('filamentId');
        const selectedText = document.getElementById('selectedFilamentText');

        hiddenInput.value = id;

        selectedText.innerHTML = `
            <span style="display:inline-flex;align-items:center;gap:6px;">
                <span style="
                    width:16px;
                    height:16px;
                    border-radius:4px;
                    border:1px solid #ccc;
                    background:${color};
                    display:inline-block;
                "></span>
                <div style="display:flex;flex-direction:column;">
                    <span>${text}</span>
                    <small style="color:#6c757d;">
                        ${colorName || ''}
                    </small>
                </div>
            </span>
        `;

        const defaultWeight =
            item.getAttribute('data-weight');

        const totalInput =
            document.querySelector('[name="weightTotal"]');

        if (defaultWeight) {
            totalInput.value = defaultWeight;
        }

        const emptyWeight =
            item.getAttribute('data-empty-weight');

        const emptyWeightInput =
            document.querySelector('[name="emptySpoolWeight"]');

        if (emptyWeight) {
            emptyWeightInput.value = emptyWeight;
        }

        const remainingInput =
            document.querySelector('[name="weightRemaining"]');

        if (defaultWeight) {
            remainingInput.value = defaultWeight;
        }

    }
</script>
</html>
