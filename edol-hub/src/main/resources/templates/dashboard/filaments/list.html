<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Filaments • Edol Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="/favicon.svg" rel="icon" type="image/svg+xml">

    <style>
        .container-xl {
            max-width: 1600px !important;
        }

        .table td,
        .table th {
            vertical-align: middle;
        }

        .arrow {
            transition: transform 0.25s ease;
        }

        .arrow.rotated {
            transform: rotate(90deg);
        }
    </style>

</head>

<body class="layout-fluid">

<div class="page">

    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark"
           th:fragment="sidebar">
        <div th:replace="~{dashboard/sidebar :: sidebar}"></div>
    </aside>

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl mt-4">

                <div class="card">

                    <div class="card-header">

                        <h3 class="card-title">Filaments</h3>

                        <div class="card-actions">
                            <a class="btn btn-primary" href="/filaments/new">
                                Add Filament
                            </a>
                        </div>

                    </div>

                    <div class="table-responsive">

                        <table class="table">

                            <thead>
                            <tr>
                                <th></th>
                                <th>ID</th>
                                <th>Vendor</th>
                                <th>Material</th>
                                <th>Brand</th>
                                <th>Color</th>
                                <th>Diameter</th>
                                <th>Actions</th>
                            </tr>
                            </thead>

                            <tbody>

                            <th:block th:each="f : ${filaments}">

                                <tr>

                                    <!-- collapse toggle -->
                                    <td>
                                        <button class="btn btn-sm btn-icon filament-toggle"
                                                data-bs-toggle="collapse"
                                                th:attr="data-bs-target=|#filament-details-${f.id}|">
                                            <i class="ti ti-chevron-right arrow"></i>
                                        </button>
                                    </td>

                                    <td th:text="${f.id}"></td>

                                    <td th:text="${f.vendor != null ? f.vendor.name : '—'}"></td>

                                    <td>
                                    <span class="badge bg-teal text-teal-fg"
                                          th:text="${f.materialType != null ? f.materialType.name : '—'}">
                                    </span>
                                    </td>

                                    <td th:text="${f.brand ?: '—'}"></td>

                                    <!-- COLOR -->
                                    <td>
                                        <div class="d-flex align-items-center gap-2">
                                            <span
                                                    th:style="'width:28px;height:28px;border-radius:4px;border:1px solid #ccc;display:inline-block;background:' + ${f.colorHex}">
                                            </span>
                                            <div>
                                                <div th:text="${f.colorName ?: '—'}"></div>
                                                <div class="text-muted small font-monospace"
                                                     th:text="${f.colorHex ?: '—'}">
                                                </div>
                                            </div>
                                        </div>
                                    </td>

                                    <td th:text="${f.diameter != null ? f.diameter + ' mm' : '—'}"></td>

                                    <!-- ACTIONS -->
                                    <td>
                                        <div class="btn-list">
                                            <a class="btn btn-sm btn-warning"
                                               th:href="@{/filaments/edit/{id}(id=${f.id})}">
                                                Edit
                                            </a>
                                            <button class="btn btn-sm btn-danger"
                                                    onclick="openDeleteModal(this)"
                                                    th:attr="
                                                        data-id=${f.id},
                                                        data-name=${f.fullId},
                                                        data-color=${f.colorHex}">
                                                Delete
                                            </button>
                                        </div>
                                    </td>

                                </tr>

                                <!-- DETAILS -->
                                <tr class="collapse"
                                    th:id="|filament-details-${f.id}|">
                                    <td colspan="8">
                                        <div class="p-3">
                                            <div class="row">

                                                <!-- FULL ID -->
                                                <div class="col-md-6">
                                                    <div class="text-muted small">Full ID</div>
                                                    <div th:text="${f.fullId ?: '—'}"></div>
                                                </div>

                                                <!-- COMMENT -->
                                                <div class="col-md-6">
                                                    <div class="text-muted small">Comment</div>
                                                    <div th:text="${f.comment ?: '—'}"></div>
                                                </div>

                                            </div>
                                        </div>
                                    </td>
                                </tr>

                            </th:block>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>
        </div>

    </div>

    <div class="modal fade" id="deleteFilamentModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        Delete Filament
                    </h5>
                    <button class="btn-close"
                            data-bs-dismiss="modal"
                            type="button"></button>
                </div>

                <div class="modal-body">
                    <p id="deleteDescription"></p>
                    <div id="deleteAllowedBlock"
                         style="display:none;">
                        <div class="alert alert-success">
                            This filament is not used anywhere.
                        </div>
                    </div>

                    <div id="deleteBlockedBlock"
                         style="display:none;">
                        <div class="alert alert-danger">
                            This filament is still used by other entities. Consider to delete them first.
                        </div>
                        <!-- SPOOLS -->
                        <div class="mb-4">
                            <h4>Spools</h4>
                            <table class="table table-sm">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Remaining</th>
                                    <th>Status</th>
                                </tr>
                                </thead>
                                <tbody id="deleteSpoolsTable"></tbody>
                            </table>
                        </div>

                        <!-- JOBS -->
                        <div>
                            <h4>Jobs</h4>
                            <table class="table table-sm">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Task</th>
                                    <th class="text-end">Used</th>
                                </tr>
                                </thead>
                                <tbody id="deleteJobsTable"></tbody>
                            </table>
                        </div>

                    </div>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Close
                    </button>
                    <a class="btn btn-danger"
                       id="confirmDeleteButton">
                        Delete
                    </a>

                </div>

            </div>
        </div>
    </div>

</div>

</body>

<script>
    document.addEventListener("DOMContentLoaded", function () {

        document.querySelectorAll('.filament-toggle').forEach(button => {

            const arrow = button.querySelector('.arrow');

            const targetSelector = button.getAttribute('data-bs-target');
            const target = document.querySelector(targetSelector);

            target.addEventListener('show.bs.collapse', () => {
                arrow.classList.add('rotated');
            });

            target.addEventListener('hide.bs.collapse', () => {
                arrow.classList.remove('rotated');
            });

        });

    });
</script>

<script>

    function openDeleteModal(button) {
        const id = button.getAttribute("data-id");
        const name = button.getAttribute("data-name");
        const color = button.getAttribute("data-color");

        document.getElementById("deleteDescription").innerHTML = `
        Delete filament [
            <span>
                <span class="avatar avatar-xs me-2"
                      style="background-color:${color || '#ccc'}"></span>

                ${name}

                <small class="text-muted ms-2 font-monospace">
                    ${color || '#N/A'}
                </small>
            </span>
        ] ?
    `;

        document.getElementById("deleteAllowedBlock").style.display = "none";
        document.getElementById("deleteBlockedBlock").style.display = "none";

        document.getElementById("deleteSpoolsTable").innerHTML = "";
        document.getElementById("deleteJobsTable").innerHTML = "";

        const confirmButton =
            document.getElementById("confirmDeleteButton");

        confirmButton.classList.remove("disabled");

        fetch(`/filaments/preview-delete/${id}`)
            .then(r => r.json())
            .then(data => {

                const hasSpools =
                    data.spools && data.spools.length > 0;

                const hasJobs =
                    data.jobs && data.jobs.length > 0;

                if (!hasSpools && !hasJobs) {

                    document.getElementById(
                        "deleteAllowedBlock"
                    ).style.display = "block";

                    confirmButton.href = `/filaments/delete/${id}`;

                } else {

                    document.getElementById(
                        "deleteBlockedBlock"
                    ).style.display = "block";

                    confirmButton.removeAttribute("href");
                    confirmButton.classList.add("disabled");

                    // SPOOLS

                    const spoolsTable =
                        document.getElementById("deleteSpoolsTable");

                    data.spools.forEach(spool => {

                        const row = document.createElement("tr");

                        row.innerHTML = `
                        <td>#${spool.id}</td>
                        <td>${spool.weightRemaining ?? '-'} g</td>
                        <td>${spool.status}</td>
                    `;

                        spoolsTable.appendChild(row);

                    });

                    // JOBS

                    const jobsTable =
                        document.getElementById("deleteJobsTable");

                    data.jobs.forEach(job => {

                        const row = document.createElement("tr");

                        row.innerHTML = `
                        <td>#${job.id}</td>
                        <td>${job.taskName}</td>
                        <td class="text-end">
                            ${job.usedGrams.toFixed(2)} g
                        </td>
                    `;

                        jobsTable.appendChild(row);

                    });

                }

            });

        const modal = new bootstrap.Modal(
            document.getElementById("deleteFilamentModal")
        );

        modal.show();
    }

</script>

</html>
