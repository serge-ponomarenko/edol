<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Filament • Edol Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="/favicon.svg" rel="icon" type="image/svg+xml">

</head>

<body class="layout-fluid">

<div class="page">

    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark"
           th:fragment="sidebar">
        <div th:replace="~{dashboard/sidebar :: sidebar}"></div>
    </aside>

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl mt-4">

                <div class="card">

                    <div class="card-header">
                        <h3 class="card-title">Add Filament</h3>
                    </div>

                    <div class="card-body">

                        <form method="post" th:action="@{/filaments}" th:object="${filament}">

                            <input th:field="*{id}" type="hidden"/>

                            <div class="row g-3">

                                <!-- FULL ID -->
                                <div class="col-md-6">
                                    <label class="form-label">Full ID</label>
                                    <input class="form-control" th:field="*{fullId}"
                                           type="text">
                                </div>

                                <!-- VENDOR -->
                                <div class="col-md-6">
                                    <label class="form-label">Vendor</label>
                                    <select class="form-select" th:field="*{vendor}">
                                        <option value="">-- Select vendor --</option>
                                        <option th:each="v : ${vendors}"
                                                th:text="${v.name}"
                                                th:value="${v.id}">
                                        </option>
                                    </select>
                                </div>

                                <!-- MATERIAL -->
                                <div class="col-md-6">
                                    <label class="form-label">Material Type</label>
                                    <select class="form-select" th:field="*{materialType}">
                                        <option value="">-- Select material --</option>
                                        <option th:each="m : ${materialTypes}"
                                                th:text="${m.name}"
                                                th:value="${m.id}">
                                        </option>
                                    </select>
                                </div>

                                <!-- BRAND -->
                                <div class="col-md-6">
                                    <label class="form-label">Brand</label>
                                    <input class="form-control" placeholder="Basic / Matte / Silk"
                                           th:field="*{brand}"
                                           type="text">
                                </div>

                                <!-- COLOR -->
                                <div class="col-md-6">
                                    <label class="form-label">Color</label>
                                    <input class="form-control form-control-color" th:field="*{colorHex}"
                                           type="color">
                                </div>

                                <!-- DIAMETER -->
                                <div class="col-md-6">
                                    <label class="form-label">Diameter (mm)</label>
                                    <input class="form-control" step="0.01"
                                           th:field="*{diameter}"
                                           type="number">
                                </div>

                                <!-- COMMENT -->
                                <div class="col-12">
                                    <label class="form-label">Comment</label>
                                    <textarea class="form-control"
                                              rows="3"
                                              th:field="*{comment}"></textarea>
                                </div>

                            </div>

                            <div class="mt-4">
                                <button class="btn btn-primary" type="submit">
                                    Save
                                </button>

                                <a class="btn btn-secondary"
                                   href="/filaments">
                                    Cancel
                                </a>
                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
