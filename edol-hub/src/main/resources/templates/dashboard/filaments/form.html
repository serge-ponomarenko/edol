<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Add Filament • Edol Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="/favicon.svg" rel="icon" type="image/svg+xml">

</head>

<body class="layout-fluid">

<div class="page">

    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark"
           th:fragment="sidebar">
        <div th:replace="~{dashboard/sidebar :: sidebar}"></div>
    </aside>

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl mt-4">

                <div class="card">

                    <div class="card-header">
                        <h3 class="card-title">Add Filament</h3>
                    </div>

                    <div class="card-body">

                        <form method="post" th:action="@{/filaments}" th:object="${filament}">

                            <input th:field="*{id}" type="hidden"/>
                            <input th:field="*{printerFilamentProfileId}" type="hidden"/>

                            <div class="row g-3">

                                <!-- FULL ID -->
                                <div class="col-md-6">
                                    <label class="form-label">Full ID</label>
                                    <input class="form-control" th:field="*{fullId}"
                                           type="text">
                                </div>

                                <!-- FULL ID -->
                                <div class="col-md-6">
                                    <label class="form-label">Printer Filament Profile ID</label>
                                    <input class="form-control" th:field="*{printerFilamentProfileId}"
                                           type="text">
                                </div>

                                <!-- VENDOR -->
                                <div class="col-md-6">
                                    <label class="form-label">Vendor</label>
                                    <select class="form-select" th:field="*{vendor}">
                                        <option value="">-- Select vendor --</option>
                                        <option th:each="v : ${vendors}"
                                                th:text="${v.name}"
                                                th:value="${v.id}">
                                        </option>
                                    </select>
                                </div>

                                <!-- MATERIAL -->
                                <div class="col-md-6">
                                    <label class="form-label">Material Type</label>
                                    <select class="form-select" th:field="*{materialType}">
                                        <option value="">-- Select material --</option>
                                        <option th:each="m : ${materialTypes}"
                                                th:text="${m.name}"
                                                th:value="${m.id}">
                                        </option>
                                    </select>
                                </div>

                                <!-- BRAND -->
                                <div class="col-md-6">
                                    <label class="form-label">Brand</label>
                                    <input class="form-control" placeholder="Basic / Matte / Silk"
                                           th:field="*{brand}"
                                           type="text">
                                </div>

                                <!-- COLOR -->
                                <div class="col-md-6">
                                    <label class="form-label">Color</label>
                                    <input class="form-control form-control-color"
                                           id="colorHex"
                                           th:field="*{colorHex}"
                                           type="color">
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Color Name</label>
                                    <div class="input-group">
                                        <input class="form-control"
                                               id="colorName"
                                               th:field="*{colorName}"
                                               type="text">
                                        <button class="btn btn-outline-primary"
                                                id="findColorBtn"
                                                type="button">
                                            <i class="ti ti-palette"></i>
                                            Find Color
                                        </button>
                                    </div>
                                </div>

                                <!-- DIAMETER -->
                                <div class="col-md-6">
                                    <label class="form-label">Diameter (mm)</label>
                                    <input class="form-control" step="0.01"
                                           th:field="*{diameter}"
                                           type="number">
                                </div>

                                <!-- COMMENT -->
                                <div class="col-12">
                                    <label class="form-label">Comment</label>
                                    <textarea class="form-control"
                                              rows="3"
                                              th:field="*{comment}"></textarea>
                                </div>

                                <hr>

                                <h3 class="card-title mb-3">
                                    Default spool settings
                                </h3>

                                <div class="md-3">
                                    <label class="form-label">
                                        Default spool weight (g)
                                    </label>

                                    <input class="form-control"
                                           min="0"
                                           step="0.1"
                                           th:field="*{defaultWeightTotal}"
                                           type="number">
                                </div>

                                <div class="md-3">
                                    <label class="form-label">
                                        Empty spool weight (g)
                                    </label>

                                    <input class="form-control"
                                           min="0"
                                           step="0.1"
                                           th:field="*{defaultEmptySpoolWeight}"
                                           type="number">
                                </div>

                                <div class="md-3">
                                    <label class="form-label">
                                        Recommended drying temperature (°C)
                                    </label>

                                    <input class="form-control"
                                           min="0"
                                           step="1"
                                           th:field="*{recommendedDryingTemperature}"
                                           type="number">
                                </div>

                                <div class="md-3">
                                    <label class="form-label">
                                        Recommended drying hours
                                    </label>

                                    <input class="form-control"
                                           min="0"
                                           step="1"
                                           th:field="*{recommendedDryingHours}"
                                           type="number">
                                </div>


                            </div>

                            <div class="mt-4">
                                <button class="btn btn-primary" type="submit">
                                    Save
                                </button>

                                <a class="btn btn-secondary"
                                   href="/filaments">
                                    Cancel
                                </a>
                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

<script>

    document
        .getElementById("findColorBtn")
        .addEventListener(
            "click",
            async () => {
                const button =
                    document.getElementById(
                        "findColorBtn"
                    );

                const colorHex =
                    document.getElementById(
                        "colorHex"
                    ).value;

                try {

                    button.disabled = true;

                    button.innerHTML =
                        '<span class="spinner-border spinner-border-sm"></span>';

                    const response =
                        await fetch(
                            `/api/colors/resolve?hex=${encodeURIComponent(colorHex)}`
                        );

                    const data =
                        await response.json();

                    document
                        .getElementById("colorName")
                        .value =
                        data.name;

                } finally {

                    button.disabled = false;

                    button.innerHTML =
                        '<i class="ti ti-palette"></i> Find Color';

                }

            }
        );

</script>

</body>
</html>
