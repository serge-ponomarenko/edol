<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Materials • Edol Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="/favicon.svg" rel="icon" type="image/svg+xml">

    <style>
        .container-xl {
            max-width: 1600px !important;
        }

        .table td,
        .table th {
            vertical-align: middle;
        }
    </style>

</head>

<body class="layout-fluid">

<div class="page">

    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark"
           th:fragment="sidebar">
        <div th:replace="~{dashboard/sidebar :: sidebar}"></div>
    </aside>

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl mt-4">

                <div class="card">

                    <div class="card-header">

                        <h3 class="card-title">Material Types</h3>

                        <div class="card-actions">
                            <a class="btn btn-primary" href="/materials/new">
                                Add Material
                            </a>
                        </div>

                    </div>

                    <div class="table-responsive">

                        <table class="table">

                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Actions</th>
                            </tr>
                            </thead>

                            <tbody>

                            <tr th:each="material : ${materials}">

                                <td th:text="${material.id}"></td>
                                <td th:text="${material.name}"></td>

                                <td>

                                    <a class="btn btn-sm btn-warning"
                                       th:href="@{/materials/edit/{id}(id=${material.id})}">
                                        Edit
                                    </a>

                                    <a class="btn btn-sm btn-danger"
                                       onclick="return confirmDelete(this)"
                                       th:attr="data-name=${material.name}"
                                       th:href="@{/materials/delete/{id}(id=${material.id})}">
                                        Delete
                                    </a>

                                </td>

                            </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

</body>

<script>
    function confirmDelete(el) {
        const name = el.dataset.name;
        return confirm("Delete material: " + name + "?");
    }
</script>

</html>
