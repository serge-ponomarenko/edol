<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Print Jobs • Edol Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="/favicon.svg" rel="icon" type="image/svg+xml">

    <style>
        .container-xl {
            max-width: 1600px !important;
        }

        .color-swatch {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            display: inline-block;
        }
    </style>

</head>

<body class="layout-fluid">

<div class="page">

    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark"
           th:fragment="sidebar">
        <div th:replace="~{dashboard/sidebar :: sidebar}"></div>
    </aside>

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl mt-4">

                <div class="card">

                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h3 class="card-title">
                            Print Jobs
                        </h3>

                        <div class="d-flex align-items-center gap-2">

                            <label class="form-label mb-0 text-muted small">
                                Per page
                            </label>

                            <select class="form-select form-select-sm w-auto"
                                    id="pageSizeSelect">
                                <option value="10" selected>10</option>
                                <option value="20">20</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                                <option value="200">200</option>
                            </select>

                        </div>

                    </div>

                    <div class="table-responsive">

                        <table class="table table-striped">

                            <thead>
                            <tr>
                                <th>Job ID</th>
                                <!--                            <th>Printer</th>-->
                                <th>Plate Image</th>
                                <th>Task</th>
                                <th>Status</th>
                                <th>Filament Usage</th>
                                <th>Progress</th>
                                <th>Started</th>
                                <th>Finished</th>
                                <th>Actions</th>
                            </tr>
                            </thead>

                            <tbody id="jobsTableBody">
                            </tbody>


                        </table>

                        <div class="text-center my-3">
                            <button class="btn btn-primary" id="loadMoreBtn">
                                <i class="ti ti-arrow-down"></i>
                                Load more
                            </button>
                        </div>

                        <div class="text-center my-3 d-none" id="loader">
                            <div class="spinner-border text-blue"></div>
                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

</body>

<script>

    let page = 0;
    let size = 10;
    const pageSizeSelect = document.getElementById("pageSizeSelect");
    const savedSize = localStorage.getItem("printJobsPageSize");
    if (savedSize) {
        size = parseInt(savedSize);
        pageSizeSelect.value = savedSize;
    }
    let loading = false;
    let lastPage = false;

    const tbody = document.getElementById("jobsTableBody");
    const loader = document.getElementById("loader");
    const loadMoreBtn = document.getElementById("loadMoreBtn");

    // 🔹 initial load
    loadMore();

    pageSizeSelect.addEventListener("change", () => {
        size = parseInt(pageSizeSelect.value);
        localStorage.setItem(
            "printJobsPageSize",
            size
        );
        page = 0;
        lastPage = false;
        tbody.innerHTML = "";
        loadMoreBtn.style.display = "";
        loadMore();
    });

    // 🔹 button click
    loadMoreBtn.addEventListener("click", () => {
        if (!loading && !lastPage) {
            loadMore();
        }
    });

    function loadMore() {
        loading = true;

        loadMoreBtn.disabled = true;
        loader.classList.remove("d-none");

        fetch(`/api/print/print-jobs?page=${page}&size=${size}`)
            .then(res => res.json())
            .then(data => {

                renderJobs(data.content);

                if (data.last) {
                    lastPage = true;
                    loadMoreBtn.style.display = "none";
                } else {
                    page++;
                    loadMoreBtn.disabled = false;
                }

            })
            .finally(() => {
                loading = false;
                loader.classList.add("d-none");
            });
    }

    function renderJobs(jobs) {
        jobs.forEach(job => {
            const row = document.createElement("tr");

            row.innerHTML = `
            <td>${job.id}</td>

            <td>
                <a target="_blank" href="/api/print/image/${job.id}">
                    <img src="/api/print/image/${job.id}" style="width:80px;border-radius:6px"/>
                </a>
            </td>

            <td>${job.taskName}</td>

            <td>
                <span class="badge ${getStatusClass(job.status)}">
                    ${job.status}
                </span>
            </td>

            <td>${renderFilamentSection(job)}</td>

            <td>${renderProgress(job)}</td>

            <td>${job.startedAtFormatted}</td>
            <td>${renderFinishedTime(job)}</td>

            <td>
                <div class="btn-list">
                    <a class="btn btn-sm btn-warning"
                       href="/print-jobs/allocation/${job.id}">
                        <i class="ti ti-edit"></i>
                    </a>
                    <a class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete JOB: ${job.taskName}?')"
                       href="/print-jobs/delete/${job.id}">
                        <i class="ti ti-trash"></i>
                    </a>
                </div>
            </td>
        `;

            tbody.appendChild(row);
        });
    }

    function getStatusClass(status) {
        if (status === 'FINISHED') return 'bg-green text-green-fg';
        if (status === 'FAILED') return 'bg-red text-red-fg';
        if (status === 'CANCELED') return 'bg-pink text-pink-fg';
        return 'bg-yellow text-yellow-fg';
    }

    function renderFilament(job) {
        if (!job.filaments || job.filaments.length === 0) return '-';

        return job.filaments.map(f => `
        <div class="mb-2">
            <div clas="d-flex align-items-center gap-2">
                <span class="color-swatch" title="${f.colorHex}" style="background:${f.colorHex}"></span>
                <b>${f.vendor}</b> ${f.material}  ${f.brand}
                <div class="text-muted small">
                    ${f.usedGrams} g • ${f.cost} ₴
                </div>
                ${renderSpools(f)}
            </div>
        </div>
    `).join('');
    }

    function renderAllocationPreview(job) {
        const preview = job.allocationPreview;

        if (!preview || !preview.groups)
            return '-';

        const reconciliationBadge =
            (
                job.allocationPreview
                && !job.allocationPreview.finalized
                && job.status !== 'RUNNING'
            )
                ? `
                    <div class="mb-2">
                        <span class="badge bg-red text-red-fg">
                            <i class="ti ti-alert-octagon"></i>
                            Reconciliation Required
                        </span>
                    </div>
                  `
                : '';

        const groupsHtml = preview.groups.map(group => {
            const items = group.items
                ?.map(item => `
                <div class="small text-muted">
                    Spool #${item.spoolId}
                    - ${item.allocatedGrams}g

                    ${
                    item.userSelected
                        ? '<span class="badge bg-blue-lt ms-1">Manual</span>'
                        : ''
                }
                </div>
            `)
                .join('');

            const warning =
                group.missingGrams > 0
                    ? `
                        <div class="alert alert-danger py-1 px-2 mt-2 mb-0">
                            <i class="ti ti-alert-triangle"></i>
                            Missing ${group.missingGrams}g
                        </div>
                      `
                    : '';

            const manual =
                group.userOverridden
                    ? `
                        <div class="text-blue small mt-1">
                            <i class="ti ti-hand-click"></i>
                            Manual allocation
                        </div>
                      `
                    : '';

            return `
                <div class="mb-3">
                    <div class="d-flex align-items-center gap-2">
                        <span class="color-swatch"
                              style="background:${group.colorHex}">
                        </span>
                        <b>${group.filamentName}</b>
                    </div>

                    <div class="small text-muted mt-1">
                        Allocated:
                        ${group.allocatedGrams}/${group.requestedGrams}g
                        •
                        ${
                group.items
                    ?.reduce(
                        (sum, item) =>
                            sum + (item.estimatedCost || 0),
                        0
                    )
                    ?.toFixed(2)
            }
                         ₴
                    </div>

                    <div class="small text-muted">
                        ${items}
                    </div>

                    ${manual}

                    ${warning}

                </div>
            `;
        }).join('');

        const manageButton = `
        <div class="mt-2">
            <a class="btn btn-sm btn-outline-primary"
               href="/print-jobs/allocation/${job.id}">
                <i class="ti ti-adjustments"></i>
                Manage Allocation
            </a>
        </div>
    `;

        return reconciliationBadge + groupsHtml + manageButton;
    }

    function renderFilamentSection(job) {
        if (
            job.status === 'RUNNING'
            || (
                job.allocationPreview
                && !job.allocationPreview.finalized
            )
        ) {
            return renderAllocationPreview(job);
        }
        return renderFilament(job);
    }

    function renderSpools(filament) {
        if (!filament.spoolUsages || filament.spoolUsages.length === 0)
            return '';

        return `
        <div class="text-muted small mt-1">
            <b>Spools:</b>
            ${
            filament.spoolUsages
                .map(su =>
                    `#${su.spoolId} - ${su.usedGrams}g`
                )
                .join(', ')
        }
        </div>
    `;
    }

    function renderProgress(job) {
        const isFinished = job.status === 'FINISHED';

        return `
        <div class="progress progress-sm">
            <div aria-valuemax="100"
                 aria-valuemin="0"
                 class="progress-bar bg-blue"
                 role="progressbar"
                 aria-valuenow="${job.progress}"
                 style="width:${job.progress}%">
            </div>
        </div>

        <div class="text-muted small mt-1">
            <span>${job.progress}%</span>
            •
            <span>${job.currentLayer}/${job.totalLayers}</span>
            •

            ${
            isFinished
                ? `
                    <span class="text-success fw-bold">
                        <i class="ti ti-check"></i>
                        <span>${job.formattedDuration}</span>
                    </span>
                  `
                : `
                    <span>
                        <i class="ti ti-clock"></i>
                        <span>${job.remainingTimeFormatted}</span>
                    </span>
                  `
        }

        </div>
    `;
    }

    function renderFinishedTime(job) {
        if (job.status === 'FINISHED') {
            return job.finishedAtFormatted || '-';
        }

        if (job.status === 'RUNNING') {
            return `<span class="text-blue fw-bold">
                    ${job.formattedEstimatedFinishTime}
                </span>`;
        }

        return '-';
    }
</script>

</html>
