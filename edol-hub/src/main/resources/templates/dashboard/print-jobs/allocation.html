<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Print Job • Edol Hub</title>

    <link href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <link href="/favicon.svg" rel="icon" type="image/svg+xml">

</head>

<body class="layout-fluid">

<div class="page">

    <aside class="navbar navbar-vertical navbar-expand-lg navbar-dark bg-dark"
           th:fragment="sidebar">
        <div th:replace="~{dashboard/sidebar :: sidebar}"></div>
    </aside>

    <div class="page-wrapper">
        <div class="page-body">
            <div class="container-xl mt-4">

                <div class="card">

                    <div class="card-header">
                        <div>
                            <h3 class="card-title mb-1">
                                Manage Allocation
                            </h3>
                            <div class="text-muted small">
                                Resolve filament allocation issues
                            </div>
                        </div>
                    </div>

                    <div class="card-body">

                        <div class="mb-4">

                            <div class="d-flex align-items-center justify-content-between">

                                <div>
                                    <h3 id="taskName"></h3>

                                    <div class="text-muted">
                                        Job #<span id="jobId"></span>
                                    </div>
                                </div>

                                <div id="jobStatusBadge"></div>

                            </div>

                        </div>

                        <div id="allocationWarnings"></div>

                        <div id="allocationGroups"></div>

                        <div class="mt-4 d-flex gap-2">

                            <button class="btn btn-primary"
                                    id="finalizeBtn">
                                <i class="ti ti-check"></i>
                                Finalize Reconciliation
                            </button>

                            <a class="btn btn-secondary"
                               href="/print-jobs">
                                Back
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>

</div>

<div class="modal fade"
     id="spoolMutationModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title"
                    id="spoolMutationTitle">
                    Edit Spool Allocation
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <input type="hidden"
                       id="spoolMutationMode">

                <input type="hidden"
                       id="spoolMutationFilamentId">

                <input type="hidden"
                       id="spoolMutationMaxJobGrams">

                <input type="hidden"
                       id="selectedSpoolId">

                <label class="form-label">
                    Spool
                </label>

                <div class="dropdown w-100 mb-3">
                    <button class="btn w-100 text-start dropdown-toggle"
                            data-bs-toggle="dropdown"
                            type="button">
                        <span id="selectedSpoolLabel">
                            -- Select spool --
                        </span>
                    </button>
                    <div class="dropdown-menu w-100"
                         id="spoolDropdownMenu"
                         style="
                            max-height: 300px;
                            overflow-y: auto;
                         ">
                    </div>
                </div>

                <label class="form-label">
                    Grams
                </label>

                <input class="form-control"
                       id="spoolMutationGrams"
                       min="1"
                       step="1"
                       type="number">

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancel
                </button>

                <button class="btn btn-primary"
                        onclick="submitSpoolMutation()">
                    Apply
                </button>

            </div>

        </div>

    </div>

</div>

<div class="modal fade"
     id="replaceFilamentModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Replace Filament
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <input type="hidden"
                       id="replaceSourceFilamentId">

                <input type="hidden"
                       id="targetFilamentId">

                <label class="form-label">
                    Select filament
                </label>

                <div class="dropdown w-100">
                    <button class="btn w-100 text-start dropdown-toggle"
                            data-bs-toggle="dropdown"
                            type="button">

                    <span id="selectedFilamentLabel">
                        -- Select filament --
                    </span>
                    </button>
                    <div class="dropdown-menu w-100"
                         id="filamentDropdownMenu"
                         style="
                            max-height: 300px;
                            overflow-y: auto;
                         ">
                    </div>
                </div>

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">
                    Cancel
                </button>

                <button class="btn btn-primary"
                        onclick="submitFilamentReplace()">
                    Replace Filament
                </button>

            </div>

        </div>

    </div>

</div>

</body>

<script>
    const jobId = window.location.pathname.split('/').pop();
    let currentPreview = null;

    loadAllocation();

    document
        .getElementById('finalizeBtn')
        .addEventListener(
            'click',
            finalizeReconciliation
        );

    function renderPreview(preview) {
        currentPreview = preview;

        document.getElementById('jobId')
            .innerText = preview.printJobId;

        const warnings =
            document.getElementById('allocationWarnings');

        const finalizeBtn =
            document.getElementById('finalizeBtn');

        if (
            preview.jobStatus !== 'RUNNING'
        ) {
            finalizeBtn.style.display = 'inline-block';
            finalizeBtn.disabled = preview.reconciliationRequired;
        } else {
            finalizeBtn.style.display = 'none';
        }

        if (preview.reconciliationRequired) {
            warnings.innerHTML = `
                <div class="alert alert-danger">
                    <div class="d-flex align-items-center gap-2">
                        <i class="ti ti-alert-octagon"></i>
                        <div>
                            <b>User action required</b><br>
                            Printing cannot be finalized
                            until allocation issues
                            are resolved.
                        </div>
                    </div>
                </div>
            `;

        } else {
            warnings.innerHTML = `
            <div class="alert alert-success">

                <div class="d-flex align-items-center gap-2">

                    <i class="ti ti-circle-check"></i>

                    <div>
                        Allocation fully resolved
                    </div>

                </div>

            </div>
        `;

        }

        const container =
            document.getElementById(
                'allocationGroups'
            );

        container.innerHTML =
            preview.groups
                .map(renderGroup)
                .join('');

        const subtitle = document.querySelector('.text-muted.small');
        if (preview.jobStatus === 'RUNNING') {
            subtitle.innerText = 'Prepare filament allocation before print completion';
        } else {
            subtitle.innerText = 'Resolve filament allocation issues';
        }

    }

    async function loadAllocation() {
        const response =
            await fetch(
                `/api/allocations/job/${jobId}`
            );

        const preview =
            await response.json();

        renderPreview(preview);
    }

    function renderGroup(group) {
        const items =
            group.items
                ?.map(renderItem)
                .join('');

        const warning =
            group.missingGrams > 0
                ? `
                <div class="alert alert-danger mt-3 mb-0">

                    <i class="ti ti-alert-triangle"></i>

                    Missing
                    ${group.missingGrams}g filament

                </div>
              `
                : '';

        const manual =
            group.userOverridden
                ? `
                <span class="badge bg-blue-lt">
                    Manual Allocation
                </span>
              `
                : '';

        return `
        <div class="card mb-4">

            <div class="card-header">

                <div class="w-100 d-flex
                            justify-content-between
                            align-items-center">

                    <div class="d-flex
                                align-items-center
                                gap-2">

                        <span style="
                            width:18px;
                            height:18px;
                            border-radius:4px;
                            border:1px solid #ccc;
                            background:${group.colorHex};
                            display:inline-block;
                        "></span>

                        <div>

                            <div class="fw-bold">
                                ${group.filamentName}
                            </div>

                            <div class="text-muted small">

                                ${group.allocatedGrams}g
                                /
                                ${group.requestedGrams}g

                            </div>

                        </div>

                    </div>

                    <div class="d-flex align-items-center gap-2">
                        ${manual}
                        <button
                            class="btn btn-sm btn-outline-primary"
                            onclick="
                openSpoolMutationModal(
                                    'replace',
                                    ${group.filamentId},
                                    ${group.requestedGrams},
                                    ${group.requestedGrams}
                                )
                            ">
                            <i class="ti ti-replace"></i>
                            Replace Spool
                        </button>
                        ${
            group.missingGrams > 0
                ? `
                        <button
                            class="btn btn-sm btn-outline-primary"
                            onclick="
                                openSpoolMutationModal(
                                    'add',
                                    ${group.filamentId},
                                    ${group.missingGrams > 0
                                        ? group.missingGrams
                                        : 1},
                                    ${group.missingGrams}
                                )
                            ">
                            <i class="ti ti-plus"></i>
                            Add Spool
                        </button>
                  `
                : ''
        }
                        <button
                            class="btn btn-sm btn-outline-secondary"
                            onclick="
                                openReplaceFilamentModal(
                                    ${group.filamentId}
                                )
                            ">
                            <i class="ti ti-arrows-exchange"></i>
                            Replace Filament
                        </button>
                    </div>

                </div>

            </div>

            <div class="card-body">

                ${items}

                ${warning}

                ${
            group.status !== 'RESOLVED'
                ? `
                <div class="mt-3">
                    <button
                        class="btn btn-outline-primary"
                        onclick="
                            rerunAllocation(
                                ${group.filamentId}
                            )
                        ">
                        <i class="ti ti-refresh"></i>
                        Re-run Allocation
                    </button>

                </div>
              `
                : ''
        }
            </div>
        </div>
    `;

    }

    function renderItem(item) {
        const manual =
            item.userSelected
                ? `
                <span class="badge bg-blue-lt">
                    Manual
                </span>
              `
                : '';

        const remaining =
            item.spoolRemainingGrams ?? '-';

        const cost =
            item.estimatedCost ?? 0;

        return `
        <div class="border rounded p-3 mb-2">

            <div class="d-flex
                        justify-content-between
                        align-items-center">

                <div>

                    <div class="fw-bold">
                        Spool #${item.spoolId}
                    </div>

                    <div class="text-muted small">
                        Available ${remaining}g
                        •
                        Allocated ${item.allocatedGrams}g
                        •
                        Cost ${cost} ₴
                    </div>

                </div>

                ${manual}

            </div>

        </div>
    `;

    }

    async function rerunAllocation(
        filamentId
    ) {
        try {
            if (
                !confirmFinalizedMutation()
            ) {
                return;
            }

            await fetch(
                `/api/allocations/rerun?jobId=${jobId}&filamentId=${filamentId}`,
                {
                    method: 'POST'
                }
            );
            await loadAllocation();
        } catch (e) {
            alert(
                'Failed to rerun allocation'
            );
        }
    }

    let replaceFilamentModal;
    let spoolMutationModal;

    document.addEventListener(
        'DOMContentLoaded',
        () => {

            replaceFilamentModal =
                new bootstrap.Modal(
                    document.getElementById(
                        'replaceFilamentModal'
                    )
                );

            spoolMutationModal =
                new bootstrap.Modal(
                    document.getElementById(
                        'spoolMutationModal'
                    )
                );

        }
    );

    async function openSpoolMutationModal(
        mode,
        filamentId,
        defaultGrams,
        maxJobGrams
    ) {
        document.getElementById(
            'spoolMutationMode'
        ).value = mode;

        document.getElementById(
            'spoolMutationFilamentId'
        ).value = filamentId;

        document.getElementById(
            'spoolMutationMaxJobGrams'
        ).value = maxJobGrams || defaultGrams || 0;

        document.getElementById(
            'selectedSpoolId'
        ).value = '';

        document.getElementById(
            'selectedSpoolLabel'
        ).innerText = '-- Select spool --';

        document.getElementById(
            'spoolMutationGrams'
        ).value = Math.max(
            1,
            defaultGrams || 1
        );

        document.getElementById(
            'spoolMutationGrams'
        ).removeAttribute('max');

        document.getElementById(
            'spoolMutationTitle'
        ).innerText =
            mode === 'replace'
                ? 'Replace Spool Allocation'
                : 'Add Spool Allocation';

        await loadSpools(
            filamentId,
            mode
        );

        spoolMutationModal.show();
    }

    async function loadSpools(
        filamentId,
        mode
    ) {
        const response =
            await fetch(
                `/api/allocations/spools?filamentId=${filamentId}`
            );

        const spools =
            filterSpoolOptions(
                await response.json(),
                filamentId,
                mode
            );

        document.getElementById(
            'spoolDropdownMenu'
        ).innerHTML =
            spools.length > 0
                ? spools
                    .map(renderSpoolOption)
                    .join('')
                : `
                    <div class="dropdown-item text-muted">
                        No available spools
                    </div>
                  `;
    }

    function filterSpoolOptions(
        spools,
        filamentId,
        mode
    ) {
        if (mode !== 'add') {
            return spools;
        }

        const usedSpoolIds =
            new Set(
                currentPreview.groups
                    .filter(group =>
                        group.filamentId == filamentId
                    )
                    .flatMap(group => group.items || [])
                    .map(item => item.spoolId)
                    .filter(Boolean)
            );

        return spools.filter(spool =>
            !usedSpoolIds.has(spool.id)
        );
    }

    function renderSpoolOption(spool) {
        const remaining =
            spool.weightRemaining ?? spool.weightTotal ?? 0;

        return `
            <a class="dropdown-item"
               href="#"
               onclick="
                    event.preventDefault();
                    selectSpool(
                        ${spool.id},
                        'Spool #${spool.id}',
                        '${spool.status}',
                        ${remaining}
                    )
               ">
                <div class="d-flex justify-content-between">
                    <span>
                        Spool #${spool.id}
                    </span>
                    <span class="text-muted">
                        &nbsp;- ${remaining}g
                    </span>
                </div>
                <div class="small text-muted">
                    ${spool.status}
                </div>
            </a>
        `;
    }

    function selectSpool(
        id,
        label,
        status,
        remaining
    ) {
        document.getElementById(
            'selectedSpoolId'
        ).value = id;

        document.getElementById(
            'selectedSpoolLabel'
        ).innerHTML = `
            <span class="d-flex justify-content-between w-100">
                <span>${label}</span>
                <span class="text-muted">
                    ${status} / ${remaining}g
                </span>
            </span>
        `;

        const gramsInput =
            document.getElementById(
                'spoolMutationGrams'
            );

        const maxJobGrams =
            Number(
                document.getElementById(
                    'spoolMutationMaxJobGrams'
                ).value
            );

        gramsInput.max =
            Math.min(
                remaining,
                maxJobGrams
            );

        if (
            Number(gramsInput.value)
            > Number(gramsInput.max)
        ) {
            gramsInput.value = gramsInput.max;
        }
    }

    async function submitSpoolMutation() {
        const mode =
            document.getElementById(
                'spoolMutationMode'
            ).value;

        const filamentId =
            document.getElementById(
                'spoolMutationFilamentId'
            ).value;

        const spoolId =
            document.getElementById(
                'selectedSpoolId'
            ).value;

        const grams =
            Number(
                document.getElementById(
                    'spoolMutationGrams'
                ).value
            );

        if (!spoolId) {
            alert('Please select spool');
            return;
        }

        if (!grams || grams <= 0) {
            alert('Grams must be greater than zero');
            return;
        }

        const maxGrams =
            Number(
                document.getElementById(
                    'spoolMutationGrams'
                ).max
            );

        if (!maxGrams || maxGrams <= 0) {
            alert(
                'No grams left to allocate for this filament'
            );
            return;
        }

        if (
            maxGrams
            && grams > maxGrams
        ) {
            alert(
                `Maximum allowed allocation is ${maxGrams}g`
            );
            return;
        }

        if (
            !confirmFinalizedMutation()
        ) {
            return;
        }

        const endpoint =
            mode === 'replace'
                ? '/api/allocations/replace-spool'
                : '/api/allocations/add-spool';

        try {
            const response =
                await fetch(
                endpoint
                + `?jobId=${jobId}`
                + `&filamentId=${filamentId}`
                + `&spoolId=${spoolId}`
                + `&grams=${grams}`,
                {
                    method: 'POST'
                }
            );

            if (!response.ok) {
                throw new Error(
                    'Spool allocation update failed'
                );
            }

            spoolMutationModal.hide();

            await loadAllocation();

        } catch (e) {
            alert('Failed to update spool allocation');
        }
    }

    function openReplaceFilamentModal(
        filamentId
    ) {

        document.getElementById(
            'replaceSourceFilamentId'
        ).value = filamentId;

        loadFilaments(
            filamentId
        );

        replaceFilamentModal.show();

    }

    async function loadFilaments(
        sourceFilamentId
    ) {

        const response =
            await fetch(
                '/api/allocations/filaments?query='
            );

        const filaments =
            await response.json();

        document.getElementById(
            'filamentDropdownMenu'
        ).innerHTML =
            filaments
                .filter(
                    f => f.id != sourceFilamentId
                )
                .map(f => `

                <a class="
                        dropdown-item
                        d-flex
                        align-items-center
                        justify-content-between
                   "
                   href="#"
                   onclick="
                        event.preventDefault();
                        selectFilament(
                            ${f.id},
                            '${f.fullId}',
                            '${f.colorHex || "#ccc"}'
                        )
                   ">

                    <div class="
                                d-flex
                                align-items-center
                           ">

                        <span class="
                                    avatar
                                    avatar-xs
                                    me-2
                              "
                              style="
                                background-color:
                                ${f.colorHex || "#ccc"}
                              ">
                        </span>

                        <span>
                            ${f.fullId}
                        </span>

                    </div>

                    <small class="
                                text-muted
                                ms-2
                                font-monospace
                           ">
                        ${f.colorHex || '#N/A'}
                    </small>

                </a>

            `)
                .join('');

    }

    function selectFilament(
        id,
        name,
        color
    ) {

        document.getElementById(
            'targetFilamentId'
        ).value = id;

        document.getElementById(
            'selectedFilamentLabel'
        ).innerHTML = `

        <span class="
                    d-flex
                    align-items-center
                    justify-content-between
                    w-100
               ">

            <span class="
                        d-flex
                        align-items-center
                   ">

                <span class="
                            avatar
                            avatar-xs
                            me-2
                       "
                       style="
                            background-color:
                            ${color}
                       ">
                </span>

                ${name}

            </span>

            <small class="
                        text-muted
                        ms-2
                        font-monospace
                   ">
                ${color}
            </small>

        </span>

    `;

    }

    async function submitFilamentReplace() {

        const sourceFilamentId =
            document.getElementById(
                'replaceSourceFilamentId'
            ).value;

        const targetFilamentId =
            document.getElementById(
                'targetFilamentId'
            ).value;

        if (!targetFilamentId) {

            alert(
                'Please select filament'
            );

            return;

        }

        if (
            sourceFilamentId
            === targetFilamentId
        ) {

            alert(
                'Cannot replace filament with itself'
            );

            return;

        }

        try {
            if (
                !confirmFinalizedMutation()
            ) {
                return;
            }

            await fetch(
                `/api/allocations/replace-filament`
                + `?jobId=${jobId}`
                + `&sourceFilamentId=${sourceFilamentId}`
                + `&targetFilamentId=${targetFilamentId}`,
                {
                    method: 'POST'
                }
            );

            replaceFilamentModal.hide();

            await loadAllocation();

        } catch (e) {

            alert(
                'Failed to replace filament'
            );

        }

    }

    function confirmFinalizedMutation() {
        if (
            !currentPreview
            || !currentPreview.finalized
        ) {
            return true;
        }

        const deltas =
            buildRollbackDeltas(
                currentPreview
            );

        const details =
            deltas.length > 0
                ? '\n\nRollback inventory changes:\n'
                + deltas.join('\n')
                : '';

        return confirm(
            'This allocation is already finalized.'
            + '\nEditing it will rollback committed spool accounting before applying your changes.'
            + details
            + '\n\nContinue?'
        );
    }

    function buildRollbackDeltas(preview) {
        const gramsBySpool = new Map();

        preview.groups
            .flatMap(group => group.items || [])
            .filter(item =>
                item.spoolId
                && item.allocatedGrams
            )
            .forEach(item => {
                gramsBySpool.set(
                    item.spoolId,
                    (
                        gramsBySpool.get(
                            item.spoolId
                        ) || 0
                    ) + item.allocatedGrams
                );
            });

        return Array.from(
            gramsBySpool.entries()
        ).map(([spoolId, grams]) =>
            `Spool #${spoolId} +${grams}g`
        );
    }

    async function finalizeReconciliation() {
        try {
            const btn =
                document.getElementById(
                    'finalizeBtn'
                );
            btn.disabled = true;
            btn.innerHTML = `
                    <span class="spinner-border
                                 spinner-border-sm
                                 me-2">
                    </span>
                Finalizing...
                `;

            const response =
                await fetch(
                    `/api/allocations/finalize?jobId=${jobId}`,
                    {
                        method: 'POST'
                    }
                );

            const finalized = await response.json();

            if (!finalized) {
                alert(
                    'Allocation still unresolved'
                );
                return;
            }

            alert(
                'Reconciliation finalized successfully'
            );

            window.location.href =
                '/print-jobs';

            await loadAllocation();

        } catch (e) {
            btn.disabled = false;
            btn.innerHTML = `
                <i class="ti ti-check"></i>
                Finalize Reconciliation
            `;
            alert(
                'Failed to finalize reconciliation'
            );
        }
    }
</script>
</html>
